apiVersion: v1
kind: Pod
metadata:
  name: secret-consumer
  namespace: secrets-demo
  labels:
    app: secret-consumer
spec:
  containers:
    - name: app
      image: busybox:1.38
      command: ["sleep", "3600"]
      # Secrets mounted as a volume (best practice) — NOT as env vars.
      # The volume uses tmpfs; it is automatically removed when the pod is deleted.
      # Env vars can be exposed in logs; volume mounts cannot.
      volumeMounts:
        - name: credentials
          mountPath: /etc/secrets
          readOnly: true
  volumes:
    - name: credentials
      secret:
        secretName: app-credentials

# Template reference only — the applicable file is generated by Terraform.
# After 'terraform apply', use: kubectl apply -f storageclass-generated.yaml
#
# To generate it manually, replace <EBS_KMS_KEY_ARN> with:
#   terraform output -raw ebs_kms_key_arn
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: encrypted-gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  kmsKeyId: <EBS_KMS_KEY_ARN>
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer

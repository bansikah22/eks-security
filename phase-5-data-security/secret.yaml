# This file shows the Secret structure for reference only — do NOT apply it as-is.
# Create the secret securely with kubectl to avoid committing credentials:
#
#   kubectl create secret generic app-credentials \
#     --namespace secrets-demo \
#     --from-literal=db-password='<YOUR_DB_PASSWORD>' \
#     --from-literal=api-key='<YOUR_API_KEY>'
apiVersion: v1
kind: Secret
metadata:
  name: app-credentials
  namespace: secrets-demo
type: Opaque
# stringData values are intentionally omitted.
# Populate the secret using the kubectl command above.

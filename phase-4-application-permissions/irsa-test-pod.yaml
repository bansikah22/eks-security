apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3-reader-irsa
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3-reader-irsa
  template:
    metadata:
      labels:
        app: s3-reader-irsa
    spec:
      serviceAccountName: s3-reader-irsa
      containers:
        - name: aws-cli
          image: public.ecr.aws/aws-cli/aws-cli:2.34.53
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"